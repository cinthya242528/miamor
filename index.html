<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake ❤️ para Cinthya</title>
    <meta name="description" content="Juego del Snake hecho con amor para Cinthya">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        :root {
            --bg: #0f0f23;
            --accent: #ff2d55;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #fff;
            font-family: "Press Start 2P", system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .header h1 {
            font-size: 2.4rem;
            color: #ff2d55;
            text-shadow: 0 0 10px #ff2d55,
                        0 0 20px #ff2d55;
            margin-bottom: 4px;
            letter-spacing: 6px;
        }
        
        .header .subtitle {
            font-size: 0.8rem;
            color: #ff8fa3;
            letter-spacing: 3px;
        }
        
        .game-container {
            position: relative;
            background: #1a1a2e;
            border: 5px solid #ff2d55;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 45, 85, 0.35),
                        inset 0 0 40px rgba(0, 0, 0, 0.6);
            padding: 14px;
        }
        
        canvas {
            display: block;
            background: #111122;
            image-rendering: pixelated;
            border: 2px solid #333355;
            border-radius: 4px;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 14px;
            padding: 0 6px;
            font-size: 0.85rem;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            color: #fff;
            font-weight: bold;
            min-width: 44px;
            text-align: right;
        }
        
        .info {
            margin-top: 18px;
            text-align: center;
            font-size: 0.65rem;
            color: #555;
            line-height: 1.7;
        }
        
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 0.65rem;
            color: #777;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .controls div {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .key {
            background: #222;
            border: 1px solid #444;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.6rem;
            color: #aaa;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 35, 0.93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 4px;
            z-index: 10;
        }
        
        .overlay.hidden {
            display: none;
        }
        
        .overlay h2 {
            font-size: 1.15rem;
            color: #ff2d55;
            margin-bottom: 10px;
        }
        
        .overlay p {
            font-size: 0.7rem;
            color: #ccc;
            margin-bottom: 18px;
            line-height: 1.5;
        }
        
        .overlay button {
            background: #ff2d55;
            color: white;
            border: none;
            padding: 14px 32px;
            font-family: "Press Start 2P", system-ui;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .overlay button:hover {
            background: #ff4d6d;
            transform: scale(1.05);
        }
        
        .overlay .final-score {
            font-size: 2rem;
            color: #fff;
            margin: 6px 0 16px;
            text-shadow: 0 0 10px #ff2d55;
        }
        
        .love {
            position: absolute;
            bottom: 10px;
            right: 14px;
            font-size: 0.65rem;
            color: #ff2d55;
            opacity: 0.65;
        }
        
        .footer {
            margin-top: 22px;
            font-size: 0.6rem;
            color: #444;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SNAKE</h1>
        <div class="subtitle">PARA CINTHYA ❤️</div>
    </div>

    <div class="game-container">
        <canvas id="game" width="520" height="520"></canvas>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-label">SCORE</span>
                <span id="score" class="stat-value">000</span>
            </div>
            <div class="stat">
                <span class="stat-label">HIGH</span>
                <span id="highscore" class="stat-value">000</span>
            </div>
            <div class="stat">
                <span class="stat-label">SPEED</span>
                <span id="speed" class="stat-value">01</span>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-overlay" class="overlay">
            <h2>🐍 SNAKE</h2>
            <p>Usa las flechas o WASD<br>para moverte</p>
            <button onclick="startGame()">JUGAR</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-overlay" class="overlay hidden">
            <h2>GAME OVER</h2>
            <div class="final-score" id="final-score">000</div>
            <p id="new-record" style="color:#ff2d55; display:none; margin-bottom:14px; font-size:0.65rem;">¡NUEVO RÉCORD!</p>
            <button onclick="restartGame()">JUGAR DE NUEVO</button>
        </div>

        <div class="love">❤️ miamor</div>
    </div>

    <div class="controls">
        <div><span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> o WASD</div>
        <div><span class="key">P</span> Pausa</div>
        <div><span class="key">R</span> Reiniciar</div>
    </div>

    <div class="info">
        Come las 🍎 • Creces y vas más rápido • No choques
    </div>

    <div class="footer">
        hecho con ❤️ para Cinthya • abre en cualquier navegador
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        const GRID_SIZE = 20;
        const CELL_SIZE = 26;
        const CANVAS_SIZE = GRID_SIZE * CELL_SIZE; // 520
        
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
        let gameSpeed = 160; // ms
        let isRunning = false;
        let isPaused = false;
        let lastMoveTime = 0;
        
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const speedEl = document.getElementById('speed');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const newRecordEl = document.getElementById('new-record');

        function initHighScore() {
            highscoreEl.textContent = highScore.toString().padStart(3, '0');
        }

        function resetGame() {
            snake = [
                { x: 8, y: 10 },
                { x: 7, y: 10 },
                { x: 6, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 160;
            isPaused = false;
            
            updateScore();
            placeFood();
        }

        function placeFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            food = newFood;
        }

        function updateScore() {
            scoreEl.textContent = score.toString().padStart(3, '0');
            speedEl.textContent = Math.min(10, Math.floor((160 - gameSpeed) / 14) + 1).toString().padStart(2, '0');
            
            if (score > highScore) {
                highscoreEl.textContent = score.toString().padStart(3, '0');
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#111122';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            // Grid lines (subtle)
            ctx.strokeStyle = '#1f1f35';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                
                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#00ff9d';
                    ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    
                    // Eyes
                    ctx.fillStyle = '#0f0f23';
                    const eyeSize = 5;
                    const eyeOffset = 7;
                    
                    if (direction.x === 1) { // right
                        ctx.fillRect(x + CELL_SIZE - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(x + CELL_SIZE - eyeOffset - eyeSize, y + CELL_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else if (direction.x === -1) { // left
                        ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(x + eyeOffset, y + CELL_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else if (direction.y === -1) { // up
                        ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(x + CELL_SIZE - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
                    } else { // down
                        ctx.fillRect(x + eyeOffset, y + CELL_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                        ctx.fillRect(x + CELL_SIZE - eyeOffset - eyeSize, y + CELL_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                    }
                } else {
                    // Body
                    const intensity = Math.max(0.55, 1 - (index / snake.length) * 0.35);
                    ctx.fillStyle = `rgb(0, ${Math.floor(220 * intensity)}, ${Math.floor(140 * intensity)})`;
                    ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    
                    // subtle shine
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(x + 3, y + 3, CELL_SIZE - 10, 4);
                }
            });

            // Draw food (red heart style)
            const foodX = food.x * CELL_SIZE + CELL_SIZE / 2;
            const foodY = food.y * CELL_SIZE + CELL_SIZE / 2;
            
            // Glow
            ctx.fillStyle = 'rgba(255, 45, 85, 0.3)';
            ctx.beginPath();
            ctx.arc(foodX, foodY, CELL_SIZE / 2 + 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Main food
            ctx.fillStyle = '#ff2d55';
            ctx.beginPath();
            ctx.arc(foodX, foodY, CELL_SIZE / 2 - 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner highlight
            ctx.fillStyle = '#ff6b8a';
            ctx.beginPath();
            ctx.arc(foodX - 3, foodY - 3, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        function moveSnake() {
            if (!isRunning || isPaused) return;

            direction = { ...nextDirection };

            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;

            // Wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some((segment, i) => i > 0 && segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Eat food?
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                
                // Increase speed every 5 apples
                if (score % 50 === 0 && gameSpeed > 60) {
                    gameSpeed -= 18;
                    restartGameLoop();
                }
                
                placeFood();
            } else {
                snake.pop();
            }
        }

        function gameLoop() {
            const now = Date.now();
            
            if (now - lastMoveTime >= gameSpeed) {
                moveSnake();
                draw();
                lastMoveTime = now;
            }
            
            if (isRunning && !isPaused) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGameLoop() {
            lastMoveTime = Date.now();
            isRunning = true;
            isPaused = false;
            requestAnimationFrame(gameLoop);
        }

        function restartGameLoop() {
            // speed change handled inside gameLoop
        }

        function startGame() {
            startOverlay.classList.add('hidden');
            gameoverOverlay.classList.add('hidden');
            
            resetGame();
            draw();
            startGameLoop();
        }

        function endGame() {
            isRunning = false;
            
            const isNewRecord = score > highScore;
            if (isNewRecord) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore.toString());
                highscoreEl.textContent = highScore.toString().padStart(3, '0');
                newRecordEl.style.display = 'block';
            } else {
                newRecordEl.style.display = 'none';
            }
            
            finalScoreEl.textContent = score.toString().padStart(3, '0');
            gameoverOverlay.classList.remove('hidden');
        }

        function restartGame() {
            gameoverOverlay.classList.add('hidden');
            resetGame();
            draw();
            startGameLoop();
        }

        function togglePause() {
            if (!isRunning) return;
            
            isPaused = !isPaused;
            
            if (!isPaused) {
                lastMoveTime = Date.now();
                requestAnimationFrame(gameLoop);
            }
        }

        function handleKeydown(e) {
            if (!isRunning && !startOverlay.classList.contains('hidden')) {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }

            if (!isRunning) return;

            switch (e.key.toLowerCase()) {
                case 'arrowup':
                case 'w':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'arrowdown':
                case 's':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'arrowleft':
                case 'a':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'arrowright':
                case 'd':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
                case 'p':
                    togglePause();
                    e.preventDefault();
                    break;
                case 'r':
                    if (gameoverOverlay.classList.contains('hidden')) {
                        resetGame();
                        draw();
                    } else {
                        restartGame();
                    }
                    e.preventDefault();
                    break;
                case ' ':
                    if (gameoverOverlay.classList.contains('hidden')) {
                        togglePause();
                    }
                    e.preventDefault();
                    break;
            }
        }

        function init() {
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
            
            initHighScore();
            
            // Initial state - show start screen
            resetGame();
            draw();
            
            // Keyboard
            document.addEventListener('keydown', handleKeydown);
            
            // Touch support (swipe)
            let touchStartX = 0;
            let touchStartY = 0;
            
            canvas.addEventListener('touchstart', (e) => {
                if (!isRunning) {
                    startGame();
                    return;
                }
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });
            
            canvas.addEventListener('touchend', (e) => {
                if (!isRunning || isPaused) return;
                
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 30 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    else if (dx < -30 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
                } else {
                    if (dy > 30 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    else if (dy < -30 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
                }
            }, { passive: true });

            canvas.addEventListener('click', () => {
                if (startOverlay.classList.contains('hidden') && gameoverOverlay.classList.contains('hidden')) {
                    togglePause();
                } else if (!startOverlay.classList.contains('hidden')) {
                    startGame();
                }
            });
            
            // Click header for hearts easter egg
            document.querySelector('.header').addEventListener('click', () => {
                const h = document.createElement('div');
                h.textContent = '❤️';
                h.style.position = 'fixed';
                h.style.left = Math.random() * window.innerWidth + 'px';
                h.style.top = '50px';
                h.style.fontSize = '20px';
                h.style.transition = 'transform 1.3s ease, opacity 1.3s ease';
                h.style.zIndex = '999';
                document.body.appendChild(h);
                
                setTimeout(() => {
                    h.style.transform = `translateY(-${90 + Math.random()*70}px)`;
                    h.style.opacity = '0';
                }, 20);
                
                setTimeout(() => h.remove(), 1500);
            });
        }

        // Boot the game
        window.onload = init;
    </script>
</body>
</html>
